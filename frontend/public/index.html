<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Intel | Presupuestación de Vanguardia</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --accent-color: #00f2ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
        }

        /* --- Navbar --- */
        nav {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .logo span { color: var(--accent-color); }

        /* --- Hero --- */
        .hero {
            padding: 6rem 5% 4rem;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 200;
            line-height: 1;
            margin-bottom: 1.5rem;
        }

        h1 b { font-weight: 800; }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-sub);
            max-width: 600px;
            margin: 0 auto 3rem;
        }

        /* --- Blueprint Form (Glass Card) --- */
        .intake-root {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            margin-bottom: 8rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-sub);
            font-weight: 600;
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* --- Steps --- */
        .step-indicator {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glass-border);
        }

        .dot.active {
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* --- Button --- */
        .btn-glow {
            width: 100%;
            padding: 1.2rem;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 2rem;
        }

        .btn-glow:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.4);
        }

        /* --- Footer --- */
        footer {
            padding: 4rem 5%;
            border-top: 1px solid var(--glass-border);
            color: var(--text-sub);
            text-align: center;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">ARCHITECT<span>INTEL</span></div>
        <div class="status">v9.0 • Engine Active</div>
    </nav>

    <div class="hero">
        <h1>Diseñá el <b>Costo</b></h1>
        <p class="subtitle">Presupuestación multi-agente con inteligencia de mercado en tiempo real. Máxima precisión para estudios de arquitectura.</p>
        
        <div class="step-indicator">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="intake-root">
        <form id="blueprintForm">
            <div class="grid">
                <!-- Seccion 1 -->
                <div class="input-group">
                    <label>Nombre del Proyecto</label>
                    <input type="text" id="nombre_obra" value="Residencia Las Chacras 2" placeholder="Ej: Casa Bosque">
                </div>
                <div class="input-group">
                    <label>Ubicación Geográfica</label>
                    <input type="text" id="ubicacion" value="Escobar, Buenos Aires" placeholder="Ciudad, Provincia">
                </div>
                
                <!-- Seccion 2 -->
                <div class="input-group">
                    <label>Superficie Cubierta (m²)</label>
                    <input type="number" id="superficie_cubierta_m2" value="150">
                </div>
                <div class="input-group">
                    <label>Superficie Semicubierta (m²)</label>
                    <input type="number" id="superficie_semicubierta_m2" value="70">
                </div>

                <!-- Seccion 3 -->
                <div class="input-group">
                    <label>Sistema Constructivo</label>
                    <select id="estructura">
                        <option value="albanileria">Albañilería Tradicional</option>
                        <option value="steel_frame">Steel Frame</option>
                        <option value="hormigon_armado">Hormigón Visto</option>
                        <option value="mixto" selected>Mixto / Híbrido</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Categoría de Terminación</label>
                    <select id="categoria">
                        <option value="economico">Económico (Base)</option>
                        <option value="estandar" selected>Estándar (Calidad)</option>
                        <option value="premium">Premium (Gama Alta)</option>
                        <option value="lujo">Luxury (Exclusivo)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Cubierta / Techo</label>
                    <select id="cubierta">
                        <option value="chapa_acanalada">Chapa Acanalada</option>
                        <option value="techo_verde">Techo Verde (Ecológico)</option>
                        <option value="membrana_losa" selected>Losa Impermeabilizada</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Pisos</label>
                    <select id="pisos">
                        <option value="ceramico">Cerámico</option>
                        <option value="porcelanato" selected>Porcelanato Rectificado</option>
                        <option value="madera">Madera Natural</option>
                        <option value="microcemento">Microcemento Alisado</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-glow" id="btnSubmit">
                Generar Libro de Obra
            </button>
        </form>

        <div id="resultArea" style="margin-top: 3rem; display: none;">
            <!-- Aquí inyectaremos los resultados dinámicos con JS -->
        </div>
    </div>

    <footer>
        © 2026 Architect Intel | Agente de Presupuestos Autónomo v9.0 | Agustín Arquitectura
    </footer>

    <script>
        // Lógica de envío al servidor (Express)
        document.getElementById('blueprintForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = 'Calculando Mercado...';
            btn.disabled = true;

            const data = {
                id: "B-" + Date.now(),
                nombre_obra: document.getElementById('nombre_obra').value,
                ubicacion: document.getElementById('ubicacion').value,
                superficie_cubierta_m2: parseFloat(document.getElementById('superficie_cubierta_m2').value),
                superficie_semicubierta_m2: parseFloat(document.getElementById('superficie_semicubierta_m2').value),
                estructura: document.getElementById('estructura').value,
                categoria: document.getElementById('categoria').value,
                cubierta: document.getElementById('cubierta').value,
                pisos: document.getElementById('pisos').value,
                factor_terminacion: 1.35, 
                version: 1,
                usuario_id: "agustin_studio",
                estudio_id: "studio_001",
                fecha_creacion: new Date().toISOString(),
                terreno: { tipo: "lote_propio" },
                plazo_meses: 12,
                modalidad: "llave_en_mano",
                instalaciones: ["electrica", "sanitaria", "gas"],
                aberturas: "aluminio_dvh",
                plantas: 1
            };

            try {
                const res = await fetch('/api/presupuesto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (result.exito) {
                    window.location.href = result.view_url || '/';
                } else {
                    alert('Error: ' + JSON.stringify(result.errores));
                }
            } catch (err) {
                alert('Fallo de conexión con el motor.');
            } finally {
                btn.innerText = 'Generar Libro de Obra';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
